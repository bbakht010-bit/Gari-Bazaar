<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="brand.css">
<meta name="robots" content="noindex,nofollow">
<title>Admin Login — GariBazaar</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; min-height:100vh; background:linear-gradient(135deg,#f8fafc,#ecfdf5); }
  nav { height:70px; border-bottom:1px solid var(--gray-200); background:rgba(255,255,255,.95); padding:0 5%; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--green-mid); text-decoration:none; }
  .logo span { color:#ca8a04; }
  .wrap { min-height:calc(100vh - 70px); display:grid; place-items:center; padding:24px; }
  .card { width:100%; max-width:430px; background:#fff; border:1px solid var(--gray-200); border-radius:16px; box-shadow:0 14px 32px rgba(0,0,0,.08); overflow:hidden; }
  .head { background:linear-gradient(135deg,#0a4a2a,var(--green-mid)); color:#fff; padding:24px; }
  .head h1 { font-family:'Playfair Display',serif; font-size:30px; }
  .head p { margin-top:8px; font-size:13px; color:rgba(255,255,255,.85); }
  .body { padding:20px; }
  .field { margin-bottom:12px; }
  .field label { display:block; margin-bottom:6px; font-size:13px; font-weight:700; color:#1f2937; }
  .field input { width:100%; border:1.5px solid var(--gray-200); border-radius:10px; padding:11px 12px; font-size:14px; outline:none; }
  .field input:focus { border-color:var(--green-main); box-shadow:0 0 0 3px rgba(21,128,61,.1); }
  .btn { width:100%; border:none; border-radius:10px; background:var(--green-main); color:#fff; font-size:14px; font-weight:700; padding:12px; cursor:pointer; }
  .btn-google { width:100%; border:1.5px solid var(--gray-200); border-radius:10px; background:#fff; color:#1f2937; font-size:14px; font-weight:700; padding:12px; cursor:pointer; margin-top:10px; }
  .btn-google:hover { border-color:var(--green-main); background:#f0fdf4; color:#166534; }
  .error { margin-top:10px; border:1px solid #fecdd3; background:#fff1f2; color:#9f1239; border-radius:9px; padding:9px 10px; font-size:12px; line-height:1.5; display:none; }
  .error.show { display:block; }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>
  <!-- Page purpose: Admin authentication gateway. -->
<nav><a class="logo" href="index.html">Gari<span>Bazaar</span></a></nav>
<main class="wrap">
  <section class="card">
    <div class="head">
      <h1>Admin Login</h1>
      <p>Only authorized admin email can access control center.</p>
    </div>
    <div class="body">
      <form id="admin-login-form">
        <div class="field"><label for="admin-email">Email</label><input id="admin-email" type="email" autocomplete="username" required></div>
        <div class="field"><label for="admin-password">Password</label><input id="admin-password" type="password" autocomplete="current-password" required></div>
        <button id="admin-login-btn" class="btn" type="submit">Login as Admin</button>
        <button id="admin-google-btn" class="btn-google" type="button">Continue with Google</button>
        <div id="admin-login-error" class="error"></div>
      </form>
    </div>
  </section>
</main>
<script type="module">
  import { getAuth, GoogleAuthProvider, signInWithEmailAndPassword, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { app, ensureUserRecord, verifyFirebaseAdminAccess } from "./firebase-client.js";
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  const form = document.getElementById("admin-login-form");
  const errorBox = document.getElementById("admin-login-error");
  const button = document.getElementById("admin-login-btn");
  const googleButton = document.getElementById("admin-google-btn");
  function showError(message) { errorBox.textContent = message; errorBox.classList.add("show"); }
  function hideError() { errorBox.classList.remove("show"); errorBox.textContent = ""; }

  async function verifyAdminOrSignOut(user) {
    const signedEmail = (user.email || "").toLowerCase();
    await ensureUserRecord(user.uid, user.email, null);
    const gate = await verifyFirebaseAdminAccess(user);
    if (!gate.ok) {
      await signOut(auth);
      throw new Error("This account is not authorized as admin. Admin access is only granted in Firebase (Firestore users/{uid} role).");
    }
    sessionStorage.setItem("gb_admin_session_email", signedEmail);
    window.location.href = "admin.html";
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    hideError();
    const email = document.getElementById("admin-email").value.trim().toLowerCase();
    const password = document.getElementById("admin-password").value;
    button.disabled = true;
    button.textContent = "Signing in...";
    try {
      const credential = await signInWithEmailAndPassword(auth, email, password);
      await verifyAdminOrSignOut(credential.user);
    } catch (error) {
      showError(error && error.message ? error.message : "Invalid admin credentials.");
    } finally {
      button.disabled = false;
      button.textContent = "Login as Admin";
    }
  });

  googleButton.addEventListener("click", async () => {
    hideError();
    googleButton.disabled = true;
    googleButton.textContent = "Please wait...";
    try {
      const credential = await signInWithPopup(auth, googleProvider);
      await verifyAdminOrSignOut(credential.user);
    } catch (error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/popup-closed-by-user") {
        showError("Google sign-in was cancelled.");
      } else if (code === "auth/unauthorized-domain") {
        showError("This domain is not authorized for Google sign-in in Firebase.");
      } else {
        showError(error && error.message ? error.message : "Google admin sign-in failed.");
      }
    } finally {
      googleButton.disabled = false;
      googleButton.textContent = "Continue with Google";
    }
  });
</script>
<script src="theme.js"></script>
</body>
</html>
