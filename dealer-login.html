<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealer Login — GariBazaar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #0a4a2a;
    --green-mid: #166534;
    --green-main: #15803d;
    --green-faint: #f0fdf4;
    --gold: #ca8a04;
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --gray-900: #111827;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--gray-900);
    background: linear-gradient(135deg, #f8fafc, #ecfdf5);
    min-height: 100vh;
  }

  nav {
    height: 70px;
    border-bottom: 1px solid var(--gray-200);
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 0 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--green-mid);
    text-decoration: none;
  }
  .logo span { color: var(--gold); }

  .back-link {
    text-decoration: none;
    color: var(--gray-600);
    font-size: 14px;
    font-weight: 500;
  }
  .back-link:hover { color: var(--green-mid); }

  .wrap {
    min-height: calc(100vh - 70px);
    display: grid;
    place-items: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 430px;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 16px;
    box-shadow: 0 14px 32px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .card-head {
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    color: white;
    padding: 24px;
  }
  .card-head h1 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    line-height: 1.1;
  }
  .card-head p {
    margin-top: 8px;
    font-size: 14px;
    color: rgba(255,255,255,0.82);
    line-height: 1.6;
  }

  .card-body { padding: 22px; }
  .field { margin-bottom: 13px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--gray-800);
    font-weight: 600;
  }
  .field input {
    width: 100%;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 14px;
    outline: none;
  }
  .field input:focus {
    border-color: var(--green-main);
    box-shadow: 0 0 0 3px rgba(21,128,61,0.1);
  }

  .btn-login {
    width: 100%;
    border: none;
    border-radius: 10px;
    background: var(--green-main);
    color: white;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
  }
  .btn-login:hover { background: var(--green-mid); }
  .btn-google {
    width: 100%;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    background: #ffffff;
    color: var(--gray-800);
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    margin-top: 10px;
  }
  .btn-google:hover { background: var(--gray-50); }
  .btn-create {
    width: 100%;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    background: var(--green-faint);
    color: var(--green-mid);
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    margin-top: 10px;
  }
  .btn-create:hover { background: #dcfce7; }

  .error {
    margin-top: 10px;
    border: 1px solid #fecdd3;
    background: #fff1f2;
    color: #9f1239;
    border-radius: 9px;
    padding: 9px 10px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }
  .error.show { display: block; }

  .auth-note {
    margin-top: 14px;
    border: 1px solid #bbf7d0;
    background: var(--green-faint);
    color: var(--green-mid);
    border-radius: 10px;
    padding: 10px;
    font-size: 12px;
    line-height: 1.55;
  }
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">Gari<span>Bazaar</span></a>
  <a class="back-link" href="index.html">Back to Home</a>
</nav>

<main class="wrap">
  <section class="card">
    <div class="card-head">
      <h1>Dealer Login</h1>
      <p>Sign in to manage your cars, employees, and listing assignments.</p>
    </div>
    <div class="card-body">
      <form id="login-form">
        <div class="field">
          <label for="email">Dealer Email</label>
          <input id="email" type="email" autocomplete="username" placeholder="dealer@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
        </div>
        <button class="btn-login" type="submit">Login to Dashboard</button>
        <button id="dealer-google-login" class="btn-google" type="button">Continue with Google</button>
        <button id="dealer-create-email" class="btn-create" type="button">New dealer? Create account with Email</button>
        <div id="login-error" class="error"></div>
      </form>
      <div class="auth-note">
        Dealer login is connected to Firebase Authentication. Use your dealer account credentials to access dashboard.
      </div>
    </div>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAs5VDo5lrmJUWONSN6gyYi856P0QXzndE",
    authDomain: "gari-bazaar.firebaseapp.com",
    projectId: "gari-bazaar",
    storageBucket: "gari-bazaar.firebasestorage.app",
    messagingSenderId: "296364565325",
    appId: "1:296364565325:web:59a017564b7dd55c9d0d04",
    measurementId: "G-7LT0S01NPP"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  const form = document.getElementById("login-form");
  const errorBox = document.getElementById("login-error");
  const submitButton = form.querySelector('button[type="submit"]');
  const googleButton = document.getElementById("dealer-google-login");
  const createEmailButton = document.getElementById("dealer-create-email");

  function showError(message) {
    errorBox.textContent = message;
    errorBox.classList.add("show");
  }

  function hideError() {
    errorBox.classList.remove("show");
    errorBox.textContent = "";
  }

  function rememberDealerSession(user) {
    sessionStorage.setItem("garibazaar_dealer_session", "active");
    localStorage.setItem("gb_dealer_uid", user.uid);
    localStorage.setItem("gb_dealer_email", user.email || "");
  }

  function hasCompleteDealerProfile(user) {
    const raw = localStorage.getItem("gb_dealer_profile_" + user.uid);
    if (!raw) return false;
    try {
      const profile = JSON.parse(raw);
      return !!(
        profile &&
        profile.businessName &&
        profile.ownerName &&
        profile.phone &&
        profile.city &&
        profile.address
      );
    } catch (error) {
      return false;
    }
  }

  function getDealerPostLoginPath(user) {
    return hasCompleteDealerProfile(user) ? "dealer-dashboard.html" : "register.html";
  }

  form.addEventListener("submit", async function (event) {
    event.preventDefault();
    hideError();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    submitButton.disabled = true;
    submitButton.textContent = "Signing in...";
    try {
      const credential = await signInWithEmailAndPassword(auth, email, password);
      rememberDealerSession(credential.user);
      window.location.href = getDealerPostLoginPath(credential.user);
    } catch (error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/invalid-credential" || code === "auth/user-not-found" || code === "auth/wrong-password") {
        showError("Invalid dealer email or password.");
      } else if (code === "auth/invalid-email") {
        showError("Please enter a valid email address.");
      } else {
        showError("Unable to sign in right now. Please try again.");
      }
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = "Login to Dashboard";
    }
  });

  googleButton.addEventListener("click", async function () {
    hideError();
    googleButton.disabled = true;
    googleButton.textContent = "Please wait...";
    try {
      const credential = await signInWithPopup(auth, googleProvider);
      rememberDealerSession(credential.user);
      window.location.href = getDealerPostLoginPath(credential.user);
    } catch (error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/popup-closed-by-user") {
        showError("Google sign-in was cancelled.");
      } else if (code === "auth/unauthorized-domain") {
        showError("This domain is not authorized in Firebase Auth settings yet.");
      } else {
        showError("Google sign-in failed. Please try again.");
      }
    } finally {
      googleButton.disabled = false;
      googleButton.textContent = "Continue with Google";
    }
  });

  createEmailButton.addEventListener("click", async function () {
    hideError();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) {
      showError("Enter email and password first, then click create account.");
      return;
    }
    createEmailButton.disabled = true;
    createEmailButton.textContent = "Creating account...";
    try {
      const credential = await createUserWithEmailAndPassword(auth, email, password);
      rememberDealerSession(credential.user);
      window.location.href = "register.html";
    } catch (error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/email-already-in-use") {
        showError("This email already has a dealer account. Please sign in.");
      } else if (code === "auth/weak-password") {
        showError("Password should be at least 6 characters.");
      } else if (code === "auth/invalid-email") {
        showError("Please enter a valid email address.");
      } else {
        showError("Could not create dealer account right now.");
      }
    } finally {
      createEmailButton.disabled = false;
      createEmailButton.textContent = "New dealer? Create account with Email";
    }
  });

  (function addQuickNav() {
    var pathNorm = window.location.pathname.replace(/\\/g, '/');
    var segs = pathNorm.split('/').filter(Boolean);
    var lastSeg = segs.length ? segs[segs.length - 1].toLowerCase() : '';
    if (pathNorm === '/' || pathNorm === '' || lastSeg === 'index.html') return;
    if (document.getElementById('gb-quick-nav')) return;
    const hostNav = document.querySelector('nav');
    if (!hostNav) return;
    const mountPoint = hostNav.querySelector('.nav-cta, .nav-right') || hostNav;
    const nav = document.createElement('div');
    nav.id = 'gb-quick-nav';
    nav.style.cssText = 'display:flex;gap:8px;align-items:center;margin-left:10px;';
    const back = document.createElement('button');
    back.type = 'button';
    back.textContent = 'Back';
    back.style.cssText = 'border:none;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;background:#f3f4f6;color:#374151;cursor:pointer;font-family:DM Sans,sans-serif;line-height:1;';
    back.addEventListener('click', () => {
      if (window.history.length > 1) window.history.back();
      else window.location.href = 'index.html';
    });
    const home = document.createElement('a');
    home.href = 'index.html';
    home.textContent = 'Home';
    home.style.cssText = 'text-decoration:none;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;background:#15803d;color:#ffffff;font-family:DM Sans,sans-serif;line-height:1;';
    nav.appendChild(back);
    nav.appendChild(home);
    mountPoint.appendChild(nav);
  })();
</script>
</body>
</html>
