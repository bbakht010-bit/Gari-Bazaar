name: Lighthouse CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://gari-bazaar.web.app/
            https://gari-bazaar.web.app/listings
            https://gari-bazaar.web.app/dealers
          uploadArtifacts: true
          temporaryPublicStorage: true
