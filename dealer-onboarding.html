<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealer Profile Setup - GariBazaar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --green-dark:#0a4a2a; --green-mid:#166534; --green-main:#15803d; --green-faint:#f0fdf4; --gray-200:#e5e7eb; --gray-600:#4b5563; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:linear-gradient(135deg,#f8fafc,#ecfdf5); min-height:100vh; }
  nav { height:70px; border-bottom:1px solid var(--gray-200); background:rgba(255,255,255,.95); padding:0 5%; display:flex; align-items:center; justify-content:space-between; }
  .logo { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--green-mid); text-decoration:none; }
  .logo span { color:#ca8a04; }
  .wrap { min-height:calc(100vh - 70px); display:grid; place-items:center; padding:24px; }
  .card { width:100%; max-width:560px; background:white; border:1px solid var(--gray-200); border-radius:16px; box-shadow:0 14px 32px rgba(0,0,0,.08); overflow:hidden; }
  .head { background:linear-gradient(135deg,var(--green-dark),var(--green-mid)); color:#fff; padding:24px; }
  .head h1 { font-family:'Playfair Display',serif; font-size:30px; line-height:1.2; }
  .head p { margin-top:8px; font-size:14px; color:rgba(255,255,255,.85); }
  .body { padding:20px; }
  .field { margin-bottom:12px; }
  .field label { display:block; margin-bottom:6px; font-size:13px; font-weight:700; color:#1f2937; }
  .field input, .field select { width:100%; border:1.5px solid var(--gray-200); border-radius:10px; padding:11px 12px; font-size:14px; outline:none; }
  .field input:focus, .field select:focus { border-color:var(--green-main); box-shadow:0 0 0 3px rgba(21,128,61,.1); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn { border:none; border-radius:10px; background:var(--green-main); color:#fff; font-size:14px; font-weight:700; padding:12px; cursor:pointer; width:100%; }
  .msg { margin-top:10px; border-radius:10px; padding:10px 11px; font-size:12px; line-height:1.5; display:none; }
  .msg.show { display:block; }
  .msg.error { border:1px solid #fecdd3; background:#fff1f2; color:#9f1239; }
</style>
</head>
<body>
<nav><a class="logo" href="index.html">Gari<span>Bazaar</span></a></nav>
<main class="wrap">
  <section class="card">
    <div class="head">
      <h1>Complete dealer profile</h1>
      <p>Set your business details first. Then dashboard and listings will stay synced to your dealership.</p>
    </div>
    <div class="body">
      <form id="dealer-onboarding-form">
        <div class="field"><label for="businessName">Dealership name</label><input id="businessName" type="text" required placeholder="Skyline Motors"></div>
        <div class="row">
          <div class="field"><label for="ownerName">Owner name</label><input id="ownerName" type="text" required placeholder="Hamza"></div>
          <div class="field"><label for="phone">Phone</label><input id="phone" type="tel" required placeholder="03xx-xxxxxxx"></div>
        </div>
        <div class="row">
          <div class="field"><label for="whatsapp">WhatsApp</label><input id="whatsapp" type="tel" required placeholder="03xx-xxxxxxx"></div>
          <div class="field"><label for="city">City</label><select id="city" required><option value="">Select city</option><option>Islamabad</option><option>Rawalpindi</option><option>Lahore</option><option>Karachi</option></select></div>
        </div>
        <button class="btn" type="submit">Save and open dashboard</button>
        <div id="dealer-onboarding-error" class="msg error"></div>
      </form>
    </div>
  </section>
</main>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  const firebaseConfig = { apiKey:"AIzaSyAs5VDo5lrmJUWONSN6gyYi856P0QXzndE", authDomain:"gari-bazaar.firebaseapp.com", projectId:"gari-bazaar", storageBucket:"gari-bazaar.firebasestorage.app", messagingSenderId:"296364565325", appId:"1:296364565325:web:59a017564b7dd55c9d0d04", measurementId:"G-7LT0S01NPP" };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const form = document.getElementById("dealer-onboarding-form");
  const errorBox = document.getElementById("dealer-onboarding-error");
  let currentUser = null;
  function profileKey(uid) { return "gb_dealer_profile_" + uid; }
  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "dealer-login.html"; return; }
    currentUser = user;
    localStorage.setItem("gb_dealer_uid", user.uid);
    localStorage.setItem("gb_dealer_email", user.email || "");
    const existing = localStorage.getItem(profileKey(user.uid));
    if (existing) { window.location.href = "dealer-dashboard.html"; }
  });
  form.addEventListener("submit", (event) => {
    event.preventDefault();
    if (!currentUser) return;
    errorBox.classList.remove("show");
    const profile = {
      businessName: document.getElementById("businessName").value.trim(),
      ownerName: document.getElementById("ownerName").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      whatsapp: document.getElementById("whatsapp").value.trim(),
      city: document.getElementById("city").value,
      email: currentUser.email || "",
      updatedAt: new Date().toISOString()
    };
    if (!profile.businessName || !profile.ownerName || !profile.phone || !profile.whatsapp || !profile.city) {
      errorBox.textContent = "Please fill all required fields.";
      errorBox.classList.add("show");
      return;
    }
    localStorage.setItem(profileKey(currentUser.uid), JSON.stringify(profile));
    window.location.href = "dealer-dashboard.html";
  });
</script>
</body>
</html>
