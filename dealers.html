<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="brand.css">
<title>All Dealers — GariBazaar</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; color: var(--gray-900); background: var(--page-bg); }
  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 5%; height: 70px; display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 700; color: var(--green-mid); text-decoration: none;
  }
  .logo span { color: var(--gold); }
  .btn {
    text-decoration: none; min-height: 40px; padding: 9px 14px; border-radius: 10px; font-size: 13px; font-weight: 700;
    border: 1.5px solid var(--green-main); color: var(--green-main);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn:hover { background: var(--green-faint); }
  .hero {
    margin-top: 70px;
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    color: white;
    padding: 52px 5% 40px;
  }
  .hero-inner { max-width: 1120px; margin: 0 auto; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(34px, 5vw, 52px); }
  .hero p { margin-top: 10px; color: rgba(255,255,255,0.82); max-width: 660px; line-height: 1.7; }
  .content { max-width: 1120px; margin: 20px auto 60px; padding: 0 5%; }
  .search-row {
    display: flex; align-items: center; gap: 8px;
    border: 1px solid var(--gray-200); border-radius: 12px; background: var(--gray-50);
    padding: 8px; margin-bottom: 16px;
  }
  .search-row input {
    flex: 1; border: 1.5px solid var(--gray-200); border-radius: 9px; padding: 10px 12px; font-size: 13px;
    font-family: 'DM Sans', sans-serif; outline: none;
  }
  .search-row input:focus { border-color: var(--green-main); box-shadow: 0 0 0 3px rgba(21,128,61,0.1); }
  .search-row button {
    border: none; background: var(--green-main); color: white; border-radius: 9px; padding: 10px 14px;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .search-row button:hover { background: var(--green-mid); }
  .sell-cta {
    display: none;
    margin-bottom: 12px;
    border: 1px solid #bbf7d0;
    background: var(--green-faint);
    color: var(--green-mid);
    border-radius: 12px;
    padding: 12px;
    font-size: 13px;
    line-height: 1.6;
  }
  .sell-cta.show { display: block; }
  .dealers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .dealer-card {
    border: 1px solid var(--gray-200); border-radius: 14px; background: white; padding: 14px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .dealer-card:hover { transform: translateY(-3px); border-color: var(--green-light); box-shadow: 0 10px 24px rgba(0,0,0,0.08); }
  .dealer-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .dealer-logo {
    width: 46px; height: 46px; border-radius: 11px; border: 1px solid var(--gray-200); overflow: hidden;
  }
  .dealer-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .dealer-name { font-size: 16px; font-weight: 700; }
  .dealer-city { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
  .dealer-meta { font-size: 13px; color: var(--gray-700); line-height: 1.6; margin-bottom: 10px; }
  .dealer-rate { font-size: 12px; color: var(--gold); margin-bottom: 10px; font-weight: 700; }
  .card-btn {
    display: block; text-decoration: none; text-align: center; border-radius: 9px; padding: 9px 11px; font-size: 13px; font-weight: 700;
    border: 1.5px solid var(--green-main); color: var(--green-main);
  }
  .card-btn:hover { background: var(--green-faint); color: var(--green-mid); }
  .card-btn.whatsapp-btn {
    margin-top: 8px;
    border-color: #16a34a;
    background: #16a34a;
    color: #fff;
  }
  .card-btn.whatsapp-btn:hover {
    background: #15803d;
    border-color: #15803d;
    color: #fff;
  }
  .empty {
    display: none; margin-top: 12px; border: 1px solid var(--gray-200); border-radius: 12px;
    background: var(--gray-50); padding: 12px; font-size: 13px; color: var(--gray-700);
  }
  .empty.show { display: block; }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>
  <!-- Page purpose: Discover verified dealers and open canonical dealer profile pages. -->
<nav>
  <a href="index.html" class="logo">Gari<span>Bazaar</span></a>
  <a class="btn" href="listings.html">Browse Cars</a>
</nav>

<section class="hero">
  <div class="hero-inner">
    <h1>Verified dealers</h1>
    <p>Search by city or name — open a profile to call or WhatsApp.</p>
  </div>
</section>

<main class="content">
  <div id="sellCtaBanner" class="sell-cta">
    Selling your car? Pick a dealer below and message them from their profile.
  </div>
  <div class="search-row">
    <input id="dealerSearchInput" type="text" placeholder="Search dealers by name, city, or speciality">
    <button id="dealerSearchBtn" type="button">Search</button>
  </div>

  <section class="dealers-grid" id="allDealersGrid"></section>
  <p class="empty" id="dealerEmptyState">No dealer matched this search. Try a city name like Islamabad or Rawalpindi.</p>
</main>

<script src="url-utils.js"></script>
<script type="module">
  import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { db } from "./firebase-client.js";

  const dealerSearchInput = document.getElementById('dealerSearchInput');
  const dealerSearchBtn = document.getElementById('dealerSearchBtn');
  const allDealersGrid = document.getElementById('allDealersGrid');
  const dealerEmptyState = document.getElementById('dealerEmptyState');
  const sellCtaBanner = document.getElementById('sellCtaBanner');

  (function initSellIntentMode() {
    const params = new URLSearchParams(window.location.search);
    const sellMode = params.get('sell') === '1';
    if (!sellMode) return;
    if (sellCtaBanner) sellCtaBanner.classList.add('show');
    if (dealerSearchInput) {
      dealerSearchInput.placeholder = 'Search dealers to sell your car (city or dealer name)';
      dealerSearchInput.focus();
    }
  })();

  function esc(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function clean(value) {
    return String(value || "").trim();
  }

  function slugify(value) {
    return clean(value).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  function normalizePkPhone(raw) {
    const digits = String(raw || "").replace(/[^\d]/g, "");
    if (digits.startsWith("92") && digits.length >= 12) return digits;
    if (digits.length === 11 && digits.startsWith("0")) return "92" + digits.slice(1);
    if (digits.length === 10 && digits.startsWith("3")) return "92" + digits;
    return digits;
  }

  async function renderLiveDealers() {
    const [dealerSnap, listingSnap] = await Promise.all([
      getDocs(collection(db, "dealerProfiles")),
      getDocs(collection(db, "listings"))
    ]);

    const listingCountByDealer = new Map();
    listingSnap.forEach((docSnap) => {
      const listing = docSnap.data() || {};
      const dealerId = String(listing.dealerId || "");
      const moderation = String(listing.moderationStatus || "live").toLowerCase();
      if (!dealerId || moderation !== "live") return;
      listingCountByDealer.set(dealerId, (listingCountByDealer.get(dealerId) || 0) + 1);
    });

    const cards = [];
    dealerSnap.forEach((docSnap) => {
      const dealer = { id: docSnap.id, ...(docSnap.data() || {}) };
      const status = String(dealer.verificationStatus || "").toLowerCase();
      const isVerified = status === "verified" || status === "approved";
      if (!isVerified || dealer.suspended) return;

      const name = clean(dealer.businessName || dealer.dealerName || dealer.id);
      const city = clean(dealer.city || "-");
      const speciality = clean(dealer.speciality || dealer.specialty || "—");
      const numericRating = Number(dealer.rating || 0);
      const rating = Number.isFinite(numericRating) && numericRating > 0
        ? numericRating.toFixed(1) + " / 5.0"
        : "No ratings yet";
      const phone = normalizePkPhone(clean(dealer.phone || dealer.whatsapp || ""));
      const hasPhone = phone.length >= 12 && phone.startsWith("92");
      const contactName = clean(dealer.ownerName || "Contact");
      const activeCars = listingCountByDealer.get(dealer.id) || 0;
      const search = [name, city, speciality, "active cars " + activeCars].join(" ").toLowerCase();
      const waText = encodeURIComponent("Assalam o Alaikum " + name + ", I want to sell my car through your dealership on GariBazaar.");
      const dealerHref = GB_URLS.dealerHref(dealer.id || [slugify(name), slugify(city)].filter(Boolean).join('-'));

      cards.push(
        '<article class="dealer-card" data-search="' + esc(search) + '">' +
          '<div class="dealer-top">' +
            '<div class="dealer-logo">' + (dealer.profilePicture
              ? '<img src="' + esc(clean(dealer.profilePicture)) + '" alt="' + esc(name) + ' logo">'
              : "") + '</div>' +
            '<div><h3 class="dealer-name">' + esc(name) + '</h3><p class="dealer-city">' + esc(city) + '</p></div>' +
          '</div>' +
          '<p class="dealer-meta">Speciality: ' + esc(speciality) + '<br>Active Cars: ' + esc(activeCars) + '</p>' +
          '<p class="dealer-rate">' + esc(rating) + '</p>' +
          '<a class="card-btn" href="' + esc(dealerHref) + '">View Dealer Profile</a>' +
          (hasPhone
            ? '<a class="card-btn whatsapp-btn" href="https://wa.me/' + esc(phone) + '?text=' + waText + '" target="_blank" rel="noopener noreferrer">Sell My Car (WhatsApp)</a>'
            : '<p class="dealer-meta" style="margin-top:8px;">WhatsApp not on file for this dealer.</p>') +
        '</article>'
      );
    });

    allDealersGrid.innerHTML = cards.join("");
    if (!cards.length && dealerEmptyState) {
      dealerEmptyState.textContent = "No verified dealers are available yet. Approve dealers from admin panel.";
      dealerEmptyState.classList.add("show");
    } else if (dealerEmptyState) {
      dealerEmptyState.classList.remove("show");
    }
  }

  function runDealerSearch() {
    if (!dealerSearchInput || !allDealersGrid) return;
    const query = dealerSearchInput.value.trim().toLowerCase();
    let visible = 0;
    allDealersGrid.querySelectorAll('.dealer-card').forEach((card) => {
      const haystack = (card.getAttribute('data-search') || '').toLowerCase();
      const show = !query || haystack.includes(query);
      card.style.display = show ? '' : 'none';
      if (show) visible += 1;
    });
    if (dealerEmptyState) dealerEmptyState.classList.toggle('show', visible === 0);
  }

  if (dealerSearchInput && dealerSearchBtn) {
    dealerSearchInput.addEventListener('input', runDealerSearch);
    dealerSearchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        runDealerSearch();
      }
    });
    dealerSearchBtn.addEventListener('click', runDealerSearch);
  }

  renderLiveDealers().catch((error) => {
    console.error("Failed to load dealers:", error);
    if (dealerEmptyState) {
      dealerEmptyState.textContent = "Could not load live dealers right now.";
      dealerEmptyState.classList.add("show");
    }
  });
</script>
<script src="theme.js"></script>
</body>
</html>
