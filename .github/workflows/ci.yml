name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Stable URL guard
        run: npm run check:stable-urls

      - name: Login/signup UX guard
        run: npm run check:login-ux

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E (Tier 1 + optional Tier 2 with secrets)
        run: npm run test:e2e
        env:
          # Optional: set Actions variable E2E_BASE_URL to override default in playwright.config.js
          BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_DEALER_EMAIL: ${{ secrets.E2E_DEALER_EMAIL }}
          E2E_DEALER_PASSWORD: ${{ secrets.E2E_DEALER_PASSWORD }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
