<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyer Sign In — GariBazaar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #0a4a2a;
    --green-mid: #166534;
    --green-main: #15803d;
    --green-faint: #f0fdf4;
    --gold: #ca8a04;
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-200: #e5e7eb;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --gray-900: #111827;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    color: var(--gray-900);
    background: linear-gradient(135deg, #f8fafc, #ecfdf5);
    min-height: 100vh;
  }
  nav {
    height: 70px;
    border-bottom: 1px solid var(--gray-200);
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 0 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--green-mid);
    text-decoration: none;
  }
  .logo span { color: var(--gold); }
  .back-link {
    text-decoration: none;
    color: var(--gray-700);
    font-size: 13px;
    font-weight: 700;
    border: 1.5px solid var(--gray-200);
    border-radius: 999px;
    background: #ffffff;
    padding: 8px 12px;
    min-height: 36px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .back-link:hover {
    color: var(--green-mid);
    border-color: var(--green-main);
    background: var(--green-faint);
  }
  .wrap {
    min-height: calc(100vh - 70px);
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 430px;
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 16px;
    box-shadow: 0 14px 32px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .card-head {
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    color: white;
    padding: 24px;
  }
  .card-head h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    line-height: 1.15;
  }
  .card-head p {
    margin-top: 8px;
    font-size: 14px;
    color: rgba(255,255,255,0.82);
    line-height: 1.6;
  }
  .card-body { padding: 22px; }
  .field { margin-bottom: 13px; }
  .field label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: var(--gray-800);
    font-weight: 600;
  }
  .field input {
    width: 100%;
    border: 1.5px solid var(--gray-200);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 14px;
    outline: none;
  }
  .field input:focus {
    border-color: var(--green-main);
    box-shadow: 0 0 0 3px rgba(21,128,61,0.1);
  }
  .btn-login {
    width: 100%;
    border: none;
    border-radius: 10px;
    background: var(--green-main);
    color: white;
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
  }
  .btn-login:hover { background: var(--green-mid); }
  .btn-google {
    width: 100%;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    background: #ffffff;
    color: var(--gray-800);
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    margin-top: 10px;
  }
  .btn-google:hover { background: #f9fafb; }
  .btn-create {
    width: 100%;
    border: 1px solid #bbf7d0;
    border-radius: 10px;
    background: var(--green-faint);
    color: var(--green-mid);
    font-size: 14px;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    margin-top: 10px;
  }
  .btn-create:hover { background: #dcfce7; }
  .error {
    margin-top: 10px;
    border: 1px solid #fecdd3;
    background: #fff1f2;
    color: #9f1239;
    border-radius: 9px;
    padding: 9px 10px;
    font-size: 12px;
    line-height: 1.5;
    display: none;
  }
  .error.show { display: block; }
  .muted-note {
    margin-top: 14px;
    border: 1px solid #bbf7d0;
    background: var(--green-faint);
    color: var(--green-mid);
    border-radius: 10px;
    padding: 10px;
    font-size: 12px;
    line-height: 1.55;
  }
  .alt-links {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: var(--gray-600);
  }
  .alt-links a { color: var(--green-main); font-weight: 600; text-decoration: none; }
  .alt-links a:hover { text-decoration: underline; }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>
  <!-- Page purpose: Buyer authentication and entry into buyer-only flows. -->
<nav>
  <a class="logo" href="index.html">Gari<span>Bazaar</span></a>
  <a class="back-link" href="index.html">Back to Home</a>
</nav>

<main class="wrap">
  <section class="card">
    <div class="card-head">
      <h1>Buyer sign in</h1>
      <p>Save favourite dealers, get alerts on new stock, and manage inquiries (coming with your Firebase rollout).</p>
    </div>
    <div class="card-body">
      <form id="buyer-login-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button class="btn-login" type="submit">Sign in</button>
        <button id="buyer-google-login" class="btn-google" type="button">Continue with Google</button>
        <button id="buyer-create-email" class="btn-create" type="button">New here? Create account with Email</button>
        <div id="buyer-login-error" class="error"></div>
      </form>
      <p class="alt-links">
        Dealer? <a href="dealer-login.html">Dealer login</a>
      </p>
    </div>
  </section>
</main>

<script type="module">
  import { signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { auth, ensureUserRecord, getBuyerProfile, isBuyerProfileComplete, upsertBuyerProfile } from "./firebase-client.js";

  const form = document.getElementById("buyer-login-form");
  const errorBox = document.getElementById("buyer-login-error");
  const submitButton = form.querySelector('button[type="submit"]');
  const googleButton = document.getElementById("buyer-google-login");
  const createEmailButton = document.getElementById("buyer-create-email");
  const googleProvider = new GoogleAuthProvider();

  function showError(message) {
    errorBox.textContent = message;
    errorBox.classList.add("show");
  }

  function hideError() {
    errorBox.classList.remove("show");
    errorBox.textContent = "";
  }

  async function getPostLoginPath(user) {
    let profile = await getBuyerProfile(user.uid);
    if (!profile) {
      const legacyRaw = localStorage.getItem("gb_buyer_profile_" + user.uid);
      if (legacyRaw) {
        try {
          const legacy = JSON.parse(legacyRaw);
          await upsertBuyerProfile(user.uid, legacy);
          profile = legacy;
        } catch (_error) {}
      }
    }
    return isBuyerProfileComplete(profile) ? "index.html" : "buyer-profile.html";
  }

  function rememberSession(user) {
    localStorage.setItem("gb_last_signed_in_uid", user.uid);
    localStorage.setItem("gb_last_signed_in_email", user.email || "");
  }

  form.addEventListener("submit", async function (event) {
    event.preventDefault();
    hideError();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    submitButton.disabled = true;
    submitButton.textContent = "Signing in...";

    try {
      const credential = await signInWithEmailAndPassword(auth, email, password);
      const record = await ensureUserRecord(credential.user.uid, credential.user.email, "buyer");
      if (record.role && record.role !== "buyer") {
        showError("This account is not a buyer account.");
        return;
      }
      rememberSession(credential.user);
      window.location.href = await getPostLoginPath(credential.user);
    } catch (error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/invalid-credential" || code === "auth/user-not-found" || code === "auth/wrong-password") {
        showError("Invalid email or password. Please try again.");
      } else if (code === "auth/invalid-email") {
        showError("Please enter a valid email address.");
      } else if (code === "auth/too-many-requests") {
        showError("Too many attempts. Please wait a moment and try again.");
      } else if (code === "auth/configuration-not-found") {
        showError("Firebase Email/Password sign-in is not enabled yet. Enable it in Firebase Authentication settings.");
      } else {
        showError("Unable to sign in right now. Please try again.");
      }
    } finally {
      submitButton.disabled = false;
      submitButton.textContent = "Sign in";
    }
  });

  googleButton.addEventListener("click", async function () {
    hideError();
    googleButton.disabled = true;
    googleButton.textContent = "Please wait...";
    try {
      const credential = await signInWithPopup(auth, googleProvider);
      const record = await ensureUserRecord(credential.user.uid, credential.user.email, "buyer");
      if (record.role && record.role !== "buyer") {
        showError("This account is not a buyer account.");
        return;
      }
      rememberSession(credential.user);
      window.location.href = await getPostLoginPath(credential.user);
    } catch (error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/popup-closed-by-user") {
        showError("Google sign-in was cancelled.");
      } else if (code === "auth/unauthorized-domain") {
        showError("This domain is not authorized in Firebase Auth settings yet.");
      } else {
        showError("Google sign-in failed. Please try again.");
      }
    } finally {
      googleButton.disabled = false;
      googleButton.textContent = "Continue with Google";
    }
  });

  createEmailButton.addEventListener("click", async function () {
    hideError();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) {
      showError("Enter email and password first, then click create account.");
      return;
    }

    createEmailButton.disabled = true;
    createEmailButton.textContent = "Creating account...";
    try {
      const credential = await createUserWithEmailAndPassword(auth, email, password);
      await ensureUserRecord(credential.user.uid, credential.user.email, "buyer");
      rememberSession(credential.user);
      window.location.href = "buyer-profile.html";
    } catch (error) {
      const code = error && error.code ? error.code : "";
      if (code === "auth/email-already-in-use") {
        showError("This email already has an account. Please sign in.");
      } else if (code === "auth/weak-password") {
        showError("Password should be at least 6 characters.");
      } else if (code === "auth/invalid-email") {
        showError("Please enter a valid email address.");
      } else {
        showError("Could not create account right now. Please try again.");
      }
    } finally {
      createEmailButton.disabled = false;
      createEmailButton.textContent = "New here? Create account with Email";
    }
  });

</script>
<script src="theme.js"></script>
</body>
</html>
